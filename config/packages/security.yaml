security:
  # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
  # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
  providers:
    # used to reload user from session & other features (e.g. switch_user)
    user_provider:
      entity:
        class: App\Entity\User
        property: username
  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false
    main:
      lazy: true
      provider: user_provider
      user_checker: App\Security\ActiveUserChecker
      logout:
      form_login:
        login_path: login
        check_path: login
      remember_me:
        secret: '%kernel.secret%' # required
        lifetime: 2419200 # 4 weeks in seconds
      switch_user: { role: ROLE_ALLOWED_TO_SWITCH }

  # Role enforcement is primarily done via #[IsGranted] attributes on controllers.
  # access_control is only used for routes without controller-level attributes.
  access_control:
    - { path: ^/admin, roles: ROLE_ADMIN }
    - { path: ^/, roles: PUBLIC_ACCESS }

  role_hierarchy:
    ROLE_EVENT_ADMIN:
      - ROLE_EVENT_EDIT
      - ROLE_EVENT_RECURRING
    ROLE_ADMIN:
      - ROLE_EVENT_ADMIN
      - ROLE_ADMIN_USER
    ROLE_SUPER_ADMIN:
      - ROLE_ADMIN
      - ROLE_ALLOWED_TO_SWITCH

when@test:
  security:
    password_hashers:
      Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
        algorithm: auto
        cost: 4 # Lowest possible value for bcrypt
        time_cost: 3 # Lowest possible value for argon
        memory_cost: 10 # Lowest possible value for argon
